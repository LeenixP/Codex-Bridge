name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx electron-builder --linux AppImage deb --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate MD5 checksums (original names)
        shell: bash
        run: |
          for f in dist/*.{AppImage,deb}; do
            [ -f "$f" ] && md5sum "$f" > "${f}.md5"
          done
      - name: Rename x64 to x86_64
        if: matrix.arch == 'x64'
        shell: bash
        run: |
          for f in dist/*-x64.*; do
            [ -f "$f" ] || continue
            newname=$(echo "$f" | sed 's/-x64\./-x86_64./')
            mv "$f" "$newname"
          done
          rm -f dist/*-x64.*.md5
      - name: Re-generate MD5 checksums (renamed files)
        if: matrix.arch == 'x64'
        shell: bash
        run: |
          for f in dist/*.{AppImage,deb}; do
            [ -f "$f" ] && md5sum "$f" > "${f}.md5"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.md5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate MD5 checksums
        shell: bash
        run: |
          for f in dist/*.exe; do
            [ -f "$f" ] && md5sum "$f" > "${f}.md5"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/*Setup*.exe
            dist/*.md5

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate MD5 checksums
        shell: bash
        run: |
          for f in dist/*.{dmg,tar.gz,zip}; do
            [ -f "$f" ] && md5 -r "$f" > "${f}.md5"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            dist/*.dmg
            dist/*.tar.gz
            dist/*.zip
            dist/*.md5

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true